# .github/workflows/collect.yml
# 올리브영 랭킹 수집기 — 10분마다 자동 실행

name: 올리브영 랭킹 수집

on:
  schedule:
    - cron: "*/10 * * * *"   # 10분마다 (UTC 기준, 한국시간 +9시간)
  workflow_dispatch:           # GitHub 웹에서 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 8         # 10분 안에 안 끝나면 강제 종료

    steps:
      # 1. 코드 체크아웃
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Python 설정
      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. 패키지 설치
      - name: 패키지 설치
        run: |
          pip install playwright requests beautifulsoup4
          playwright install chromium --with-deps

      # 4. 수집 실행
      - name: 랭킹 수집 및 GAS 전송
        env:
          GAS_WEB_APP_URL: ${{ secrets.GAS_WEB_APP_URL }}
          SECRET:          ${{ secrets.COLLECTOR_SECRET }}
        run: python oliveyoung_collector.py
